name: Bug report
description: Report a reproducible SAGE CLI problem.
title: "bug: "
labels: ["bug", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve SAGE CLI. Do not paste secrets, private logs, API keys, raw command output, or private file paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Keep commands minimal and redact private data.
      placeholder: |
        1. Run `sage run -- ...`
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        SAGE CLI version:
    validations:
      required: true
