<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">sage mcp install terminal capture</title>
  <desc id="desc">Terminal-style capture showing SAGE MCP configuration installation.</desc>
  <rect width="900" height="360" rx="12" fill="#0b1120"/>
  <rect x="0" y="0" width="900" height="44" rx="12" fill="#020617"/>
  <circle cx="24" cy="22" r="6" fill="#ef4444"/>
  <circle cx="44" cy="22" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="22" r="6" fill="#22c55e"/>
  <text x="24" y="78" fill="#e5e7eb" font-family="Consolas, monospace" font-size="20">$ sage mcp install</text>
  <text x="24" y="122" fill="#a7f3d0" font-family="Consolas, monospace" font-size="18">[OK] MCP server config installed to ~/.claude/mcp-servers.json</text>
  <text x="24" y="162" fill="#bfdbfe" font-family="Consolas, monospace" font-size="18">Restart your MCP-compatible client to use SAGE tools.</text>
  <rect x="24" y="198" width="852" height="98" rx="8" fill="#1e293b"/>
  <text x="44" y="234" fill="#f8fafc" font-family="Consolas, monospace" font-size="17">"sage": {</text>
  <text x="64" y="262" fill="#f8fafc" font-family="Consolas, monospace" font-size="17">"command": "python",</text>
  <text x="64" y="290" fill="#f8fafc" font-family="Consolas, monospace" font-size="17">"args": ["-m", "sage.mcp.server"]</text>
  <text x="44" y="318" fill="#f8fafc" font-family="Consolas, monospace" font-size="17">}</text>
</svg>
