<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">sage run terminal capture</title>
  <desc id="desc">Terminal-style capture showing sage run executing pytest and compressing output.</desc>
  <rect width="900" height="420" rx="12" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="44" rx="12" fill="#111827"/>
  <circle cx="24" cy="22" r="6" fill="#ef4444"/>
  <circle cx="44" cy="22" r="6" fill="#f59e0b"/>
  <circle cx="64" cy="22" r="6" fill="#22c55e"/>
  <text x="24" y="78" fill="#e5e7eb" font-family="Consolas, monospace" font-size="20">$ sage run -- python -m pytest</text>
  <text x="24" y="118" fill="#a7f3d0" font-family="Consolas, monospace" font-size="18">tests/test_cli_basic.py::TestSageRun::test_sage_run_echo PASSED</text>
  <text x="24" y="150" fill="#a7f3d0" font-family="Consolas, monospace" font-size="18">tests/test_security_privacy.py::test_run_command_redacts_before_storage PASSED</text>
  <text x="24" y="192" fill="#93c5fd" font-family="Consolas, monospace" font-size="18">[sage] saved run #4712 exit=0 time=805ms</text>
  <text x="24" y="224" fill="#93c5fd" font-family="Consolas, monospace" font-size="18">[sage] context: saved 1,842 tokens (92.6% compression)</text>
  <text x="24" y="256" fill="#c4b5fd" font-family="Consolas, monospace" font-size="18">[sage] agents: 4 completed (Test Agent, Security Agent, Code Agent, Debug Agent)</text>
  <text x="24" y="300" fill="#e5e7eb" font-family="Consolas, monospace" font-size="18">Raw stdout/stderr preserved locally. Compact proof returned to the agent.</text>
  <rect x="24" y="330" width="852" height="54" rx="8" fill="#1e293b"/>
  <text x="44" y="364" fill="#f8fafc" font-family="Consolas, monospace" font-size="18">Next: sage explain | sage suggest | sage show --raw</text>
</svg>
