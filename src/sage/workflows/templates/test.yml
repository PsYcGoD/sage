name: Test Workflow
version: 1.0

env:
  PYTHONPATH: src

variables:
  test_path: tests

pipeline:
  - name: Run Unit Tests
    run: python -m pytest ${test_path} -v
    continue_on_fail: false
    
  - name: Check Coverage
    run: python -m pytest ${test_path} --cov=src --cov-report=term
    on_fail:
      - echo "Coverage check failed"
